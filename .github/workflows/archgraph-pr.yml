name: ArchGraph PR Analysis

on:
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Evaluate Architecture Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for git diff

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Build System
        run: |
          go build -o archgraph zone6/cmd/archgraph-cli/main.go
          go build -o zone2d zone2/cmd/zone2d/main.go

      - name: Start ArchGraph Services
        run: |
          # Start the backend stack using the supervisor tool
          cd cmd/archgraph
          go run . -root ../.. &
          # Give services 5 seconds to boot and verify health
          sleep 5

      - name: Scan & Ingest Changes
        run: |
          # Trigger initial scan to populate target graph
          ./run-archgraph.sh . github-pr-action

      - name: Calculate Impact & Generate Report
        id: analyze
        run: |
          # Compare PR changes against base branch (main)
          ./archgraph analyze-pr --base-ref origin/main --head-ref HEAD --out pr_report.md
          cat pr_report.md

      - name: Post PR Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr_report.md
